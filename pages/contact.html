    <h1>Contact Us</h1>
    <a href="../index.html" target="_blank" rel="noopener noreferrer">Home</a><br>

    <section>
        <h2>Get in touch with Us ☎️</h2>


        <div class="form-group">
    <label for="fname">First name:</label>
    <input type="text" id="fname" name="fname" required>
  </div><br>
        
  <div class="form-group">
    <label for="lname">Last name:</label>
    <input type="text" id="lname" name="lname" required>
  </div><br>
  <div class="form-group">
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
  </div><br>

  <div class="form-group">
    <label for="tel">Telephone:</label>
    <input type="tel" id="tel" name="tel">
  </div><br>

  <div class="form-group">
    <textarea id="message" name="message" rows="8" cols="35"
      placeholder="Please type your message here"></textarea>
  </div>

  <button type="submit">Send Message</button>
</section>

    <p>We'd love to hear from you! Reach out using the details below:</p>
    <p>Email: <a href="Send email to:info@unotours.com" target="_blank" rel="noopener noreferrer">info@unotours.com</a></p>
    <p>Phone: <a href="tel: +233554327999" target="_blank" rel="noopener noreferrer">+233 554-327-999</a></p>
    </section>
